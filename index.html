<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>全国 日最深積雪 平面マップ</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" rel="stylesheet" />
<style>
  :root{
    --bg:#0a0f16;
    --panel:#0f1720ee;
    --panel-border:#1e2c3a;
    --ink:#c9d6e2;
    --sub:#7488a0;
    --accent:#38bdf8;
    --accent-deep:#7dd3fc;
    --line:#1e2c3a;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0; padding:0; height:100%;
    font-family:"Hiragino Sans","Yu Gothic",-apple-system,BlinkMacSystemFont,sans-serif;
    background:var(--bg);
    color:var(--ink);
    overflow:hidden;
  }
  #map{
    position:absolute; inset:0;
    background:var(--bg);
  }
  .leaflet-control-attribution{
    background:rgba(10,14,20,0.7) !important;
    color:var(--sub) !important;
  }
  .leaflet-control-attribution a{ color:var(--accent-deep) !important; }

  /* GSIタイルをCSSフィルタで反転し、陸を暗く・海を紺色に見せる */
  .leaflet-tile-pane{ transition: filter .2s; }
  #map.dark-tiles .leaflet-tile-pane{
    filter: invert(92%) hue-rotate(180deg) brightness(0.92) contrast(0.92) saturate(0.9);
  }

  #title{
    position:absolute; top:14px; left:14px; z-index:1000;
    background:var(--panel);
    backdrop-filter: blur(8px);
    padding:10px 16px;
    border-radius:10px;
    border:1px solid var(--panel-border);
    box-shadow:0 4px 20px rgba(0,0,0,0.5);
    font-size:14px;
    line-height:1.4;
  }
  #title b{
    font-size:16px;
    display:block;
    color:var(--accent-deep);
    letter-spacing:0.02em;
  }
  #title span{
    font-size:11px;
    color:var(--sub);
  }

  #hint{
    position:absolute; top:14px; right:14px; z-index:1000;
    background:var(--panel);
    border:1px solid var(--panel-border);
    padding:8px 12px; border-radius:8px;
    font-size:11px; color:var(--sub); max-width:230px; line-height:1.6;
    box-shadow:0 4px 20px rgba(0,0,0,0.5);
  }

  #panel{
    position:absolute; left:0; right:0; bottom:0; z-index:1000;
    background:var(--panel);
    backdrop-filter: blur(10px);
    border-top:1px solid var(--panel-border);
    box-shadow:0 -4px 24px rgba(0,0,0,0.5);
    padding:12px 20px 16px;
  }
  #dateRow{
    display:flex; align-items:center; gap:14px; margin-bottom:8px;
  }
  #dateLabel{
    font-size:22px; font-weight:700; color:var(--accent-deep);
    min-width:150px; font-variant-numeric: tabular-nums;
  }
  #playBtn{
    width:42px; height:42px; border-radius:50%;
    border:none; background:var(--accent); color:#0a0f16;
    font-size:16px; cursor:pointer; flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 2px 10px rgba(56,189,248,0.45);
    transition:background 0.15s, transform 0.1s;
  }
  #playBtn:hover{ background:var(--accent-deep); transform:scale(1.04); }
  #slider{
    flex:1;
    accent-color: var(--accent);
    height:6px;
  }
  #speedSel{
    font-size:12px; padding:4px 6px; border-radius:6px; border:1px solid var(--line);
    background:#131e2a; color:var(--ink);
  }
  #legend{
    display:flex; align-items:center; gap:10px; font-size:11px; color:var(--sub);
    margin-top:2px;
    flex-wrap:wrap;
  }
  #legend .grad{
    width:150px; height:10px; border-radius:5px;
    background: linear-gradient(to right, rgba(10,15,22,0), rgba(56,189,248,0.5) 15%, rgba(186,228,248,0.8) 55%, #ffffff 100%);
    border:1px solid var(--line);
  }
  #maxInfo{
    font-size:11px; color:var(--sub); margin-left:auto; text-align:right;
  }
  #maxInfo b{ color:var(--accent-deep); }

  .snow-label-wrap{
    display:flex; flex-direction:column; align-items:center;
    pointer-events:none;
    transform: translate(-50%, -100%);
    white-space:nowrap;
  }
  .snow-label{
    font-size:10px; font-weight:700; color:#fff;
    text-shadow:0 1px 3px rgba(0,0,0,0.95), 0 0 6px rgba(0,0,0,0.85);
    white-space:nowrap;
    font-variant-numeric:tabular-nums;
    pointer-events:auto;
    cursor:default;
  }
  .snow-label-dot{
    width:3px; height:3px; border-radius:50%;
    background:rgba(255,255,255,0.55);
    margin-top:2px;
  }

  #stationTooltip{
    position:fixed; z-index:3000; pointer-events:none;
    background:var(--panel);
    border:1px solid var(--panel-border);
    color:var(--accent-deep);
    padding:4px 10px;
    border-radius:8px;
    font-size:12px;
    font-weight:700;
    white-space:nowrap;
    box-shadow:0 4px 20px rgba(0,0,0,0.5);
    opacity:0;
    transform:translate(-50%, -130%);
    transition:opacity .1s;
  }
  #stationTooltip.visible{ opacity:1; }

  #loading{
    position:absolute; inset:0; z-index:2000;
    background:var(--bg);
    display:flex; align-items:center; justify-content:center;
    flex-direction:column; gap:10px;
    font-size:13px; color:var(--sub);
    transition:opacity 0.4s;
  }
  #loading .spin{
    width:28px; height:28px; border-radius:50%;
    border:3px solid #1e2c3a; border-top-color:var(--accent);
    animation:spin 0.9s linear infinite;
  }
  @keyframes spin{ to{ transform:rotate(360deg); } }

  #yearRow{
    margin-top:6px;
    display:flex; align-items:center; gap:6px;
    font-size:11px; color:var(--sub);
  }
  #yearSel{
    font-size:12px; padding:3px 6px; border-radius:6px; border:1px solid var(--line);
    background:#131e2a; color:var(--ink);
  }
  #regionSel{
    font-size:12px; padding:3px 6px; border-radius:6px; border:1px solid var(--line);
    background:#131e2a; color:var(--ink);
  }
  #regionRow{
    margin-top:4px;
    display:flex; align-items:center; gap:6px;
    font-size:11px; color:var(--sub);
  }
</style>
</head>
<body>

<div id="map"></div>
<div id="stationTooltip"></div>

<div id="loading"><div class="spin"></div><div>データを読み込み中...</div></div>

<div id="title">
  <b id="titleText">全国 日最深積雪 平面マップ</b>
  <span id="rangeLabel">読み込み中…</span>
  <div id="regionRow">
    <label for="regionSel">地域:</label>
    <select id="regionSel">
      <option value="national">全国</option>

  </div>
  <div id="yearRow">
    <label for="yearSel">対象年:</label>
    <select id="yearSel"><option value="1983">1983〜1984年</option><option value="1984">1984〜1985年</option><option value="1985">1985〜1986年</option><option value="1986">1986〜1987年</option><option value="1987">1987〜1988年</option><option value="1988">1988〜1989年</option><option value="1989">1989〜1990年</option><option value="1990">1990〜1991年</option><option value="1991">1991〜1992年</option><option value="1992">1992〜1993年</option><option value="1993">1993〜1994年</option><option value="1994">1994〜1995年</option><option value="1995">1995〜1996年</option><option value="1996">1996〜1997年</option><option value="1997">1997〜1998年</option><option value="1998">1998〜1999年</option><option value="1999">1999〜2000年</option><option value="2000">2000〜2001年</option><option value="2001">2001〜2002年</option><option value="2002">2002〜2003年</option><option value="2003">2003〜2004年</option><option value="2004">2004〜2005年</option><option value="2005">2005〜2006年</option><option value="2006">2006〜2007年</option><option value="2007">2007〜2008年</option><option value="2008">2008〜2009年</option><option value="2009">2009〜2010年</option><option value="2010">2010〜2011年</option><option value="2011">2011〜2012年</option><option value="2012">2012〜2013年</option><option value="2013">2013〜2014年</option><option value="2014">2014〜2015年</option><option value="2015">2015〜2016年</option><option value="2016">2016〜2017年</option><option value="2017">2017〜2018年</option><option value="2018">2018〜2019年</option><option value="2019">2019〜2020年</option><option value="2020">2020〜2021年</option><option value="2021">2021〜2022年</option><option value="2022">2022〜2023年</option><option value="2023">2023〜2024年</option><option value="2024">2024〜2025年</option><option value="2025">2025〜2026年</option></select>
  </div>
</div>


<div id="hint">
  ドラッグで平行移動、スクロール／ピンチで拡大縮小できます。<br>
  白い塗り＝観測地点から補間した積雪深、数値＝各地点の実際の積雪深（cm）です。
</div>

<div id="panel">
  <div id="dateRow">
    <button id="playBtn">▶</button>
    <div id="dateLabel">----/--/--</div>
    <input type="range" id="slider" min="0" max="0" value="0" step="1">
    <select id="speedSel">
      <option value="700">遅い</option>
      <option value="350" selected>ふつう</option>
      <option value="150">速い</option>
    </select>
  </div>
  <div id="legend">
    <span>積雪の塗り分け:</span>
    <div class="grad"></div>
    <span style="margin-left:14px;">数値＝地点の積雪深（0〜<span id="legendMax">cm</span>）</span>
    <label style="margin-left:14px; display:inline-flex; align-items:center; gap:4px; cursor:pointer;">
      <input type="checkbox" id="numbersToggle" checked>
      数字を表示
    </label>
    <span id="maxInfo"></span>
  </div>
</div>
<script type="module">
// ==== DATA ====
// stations.json / coastline.json cover all of Japan (Hokkaido, Tohoku,
// Eastern Japan, Western Japan combined). Every station and every land
// polygon is always loaded and always rendered — the region selector only
// moves the camera (map.fitBounds), it never filters what's drawn. This
// keeps e.g. Tohoku's snow visible while the camera is framed on Hokkaido.
const DATA_BASE = './data';

async function fetchJSON(path) {
  const res = await fetch(path);
  if (!res.ok) throw new Error(`Failed to load ${path}: ${res.status}`);
  return res.json();
}

const yearDataCache = new Map();
async function loadYearData(yearKey) {
  if (yearDataCache.has(yearKey)) return yearDataCache.get(yearKey);
  const data = await fetchJSON(`${DATA_BASE}/snow/${yearKey}.json`);
  yearDataCache.set(yearKey, data);
  return data;
}

const YEAR_KEYS = ["1983", "1984", "1985", "1986", "1987", "1988", "1989", "1990", "1991", "1992", "1993", "1994", "1995", "1996", "1997", "1998", "1999", "2000", "2001", "2002", "2003", "2004", "2005", "2006", "2007", "2008", "2009", "2010", "2011", "2012", "2013", "2014", "2015", "2016", "2017", "2018", "2019", "2020", "2021", "2022", "2023", "2024", "2025"];
const DEFAULT_YEAR = YEAR_KEYS[YEAR_KEYS.length - 1];

// GRID_BOUNDS: the one fixed extent the shared interpolation grid is built
// over. Chosen to fully contain every region's camera view below (with
// margin) so panning/focusing on any region never shows a blank edge.
const GRID_BOUNDS = { lonMin: 122.50, lonMax: 146.50, latMin: 24.00, latMax: 45.65 };

// VIEW_BOUNDS: camera framing only, used with map.fitBounds() when the
// region selector changes. "national" is intentionally tighter than
// GRID_BOUNDS (Soya Strait down to Yakushima) so the default view isn't
// zoomed out as far as Sakhalin/Taiwan; the underlying grid still covers
// the full country, so Okinawa etc. remain visible/paintable if you pan.
const REGION_LABELS = { national: '全国', hokkaido: '北海道', tohoku: '東北', eastern: '東日本', western: '西日本' };
const VIEW_BOUNDS = {
  national: { lonMin: 128.30, lonMax: 146.20, latMin: 29.80, latMax: 45.70 },
  hokkaido: { lonMin: 139.30, lonMax: 145.95, latMin: 41.30, latMax: 45.62 },
  tohoku:   { lonMin: 138.90, lonMax: 142.30, latMin: 36.60, latMax: 41.75 },
  eastern:  { lonMin: 135.90, lonMax: 141.10, latMin: 34.40, latMax: 38.70 },
  western:  { lonMin: 128.60, lonMax: 136.80, latMin: 28.20, latMax: 36.35 }
};
const DEFAULT_REGION = 'national';

let allStations = [];
let allCoast = [];
let N = 0;

let dates = [];
let series = [];

let startIndex = 0;
let globalMax = 0;
let colorScaleMax = 1;

function computeGlobalMax() {
  let m = 0;
  for (const day of series) for (const v of day) if (v !== null && v > m) m = v;
  return m;
}

function pointInRing(lon, lat, ring) {
  let inside = false;
  for (let i = 0, j = ring.length - 1; i < ring.length; j = i++) {
    const xi = ring[i][0], yi = ring[i][1];
    const xj = ring[j][0], yj = ring[j][1];
    const cross = ((yi > lat) !== (yj > lat))
      && (lon < (xj - xi) * (lat - yi) / (yj - yi) + xi);
    if (cross) inside = !inside;
  }
  return inside;
}

// A point counts as land if it falls inside ANY coastline polygon,
// nationwide. Each polygon's bounding box is checked first so the grid
// scan stays fast even with 800+ polygons.
function isPointOnLand(lon, lat) {
  for (let p = 0; p < allCoast.length; p++) {
    const poly = allCoast[p];
    const b = poly.b;
    if (lon < b[0] || lon > b[2] || lat < b[1] || lat > b[3]) continue;
    if (pointInRing(lon, lat, poly.r)) return true;
  }
  return false;
}

// Web Mercator <-> latitude helpers. Leaflet's ImageOverlay places a raster
// by linearly interpolating in *Mercator* space between the bounds' two
// corners, not in raw degrees. A grid whose rows are spaced evenly in
// degrees drifts further from its true position the taller the bounds
// are — negligible for a ~5° regional box, but several tens of km over
// the full country. Spacing rows evenly in Mercator-Y instead keeps every
// row exactly where it belongs regardless of extent.
function latToMercY(lat) {
  const rad = lat * Math.PI / 180;
  return Math.log(Math.tan(Math.PI / 4 + rad / 2));
}
function mercYToLat(y) {
  return (2 * Math.atan(Math.exp(y)) - Math.PI / 2) * 180 / Math.PI;
}

async function main() {
  [allStations, allCoast] = await Promise.all([
    fetchJSON(`${DATA_BASE}/stations.json`),
    fetchJSON(`${DATA_BASE}/coastline.json`)
  ]);
  N = allStations.length;

// ============================================================
// 1) Set up the flat map (no terrain / no 3D — pitch is locked to 0)
// ============================================================
const vb0 = VIEW_BOUNDS[DEFAULT_REGION];
const map = L.map('map', {
  zoomControl: true,
  attributionControl: true,
  dragging: true,
  scrollWheelZoom: true,
  touchZoom: true,
  doubleClickZoom: true,
  boxZoom: false
}).fitBounds([[vb0.latMin, vb0.lonMin], [vb0.latMax, vb0.lonMax]]);
document.getElementById('map').classList.add('dark-tiles');

const { lonMin, lonMax, latMin, latMax } = GRID_BOUNDS;
const sigmaKm = 45; // Gaussian IDW smoothing radius (widened to avoid patchy blob artifacts)

// ============================================================
// 2) Interpolation grid — a flat raster of snow depth (cm), covering
//    the whole country, computed once (station positions + the fixed
//    GRID_BOUNDS never change), later painted onto a canvas and draped
//    flat on the basemap. Region switching never touches this.
// ============================================================
const GRID_NX = 340, GRID_NY = 300;

const gridLon = new Float64Array(GRID_NX);
const gridLat = new Float64Array(GRID_NY);
for (let i = 0; i < GRID_NX; i++) gridLon[i] = lonMin + (i / (GRID_NX - 1)) * (lonMax - lonMin);
{
  const yTop = latToMercY(latMax);
  const yBot = latToMercY(latMin);
  for (let j = 0; j < GRID_NY; j++) {
    const y = yTop - (j / (GRID_NY - 1)) * (yTop - yBot);
    gridLat[j] = mercYToLat(y);
  }
}

const gridWeights = new Float32Array(GRID_NX * GRID_NY * N);
const isLand = new Uint8Array(GRID_NX * GRID_NY);

// "Core" field: a second, much narrower-sigma Gaussian interpolation used
// only very close to stations, so an isolated peak (e.g. Mt. Fuji) keeps
// its true value instead of being pulled down by the broad-sigma field's
// distant zero-snow neighbors. Earlier this snapped to the single nearest
// station's raw value, which produced hard seams (a mottled look) at the
// boundary between two nearby stations' "nearest" zones. Summing over the
// K closest stations with a tight Gaussian instead keeps that boundary
// continuous — it blends smoothly between whichever stations are close,
// rather than jumping from one to the other.
const sigmaCoreKm = 16;
const CORE_K = 10;
const coreIdx = new Int16Array(GRID_NX * GRID_NY * CORE_K).fill(-1);
const coreWeight = new Float32Array(GRID_NX * GRID_NY * CORE_K);
const nearestDistKm = new Float32Array(GRID_NX * GRID_NY);

{
  const latRefRad = ((latMin + latMax) / 2) * Math.PI / 180;
  const kmPerDegLat = 110.57;
  const kmPerDegLon = 111.32 * Math.cos(latRefRad);
  const topD2 = new Float64Array(CORE_K);
  const topS = new Int16Array(CORE_K);
  for (let j = 0; j < GRID_NY; j++) {
    const glat = gridLat[j];
    for (let i = 0; i < GRID_NX; i++) {
      const glon = gridLon[i];
      const gridIdx = j * GRID_NX + i;
      isLand[gridIdx] = isPointOnLand(glon, glat) ? 1 : 0;
      if (!isLand[gridIdx]) continue;
      const rowOffset = gridIdx * N;
      let sum = 0;
      topD2.fill(Infinity);
      topS.fill(-1);
      for (let s = 0; s < N; s++) {
        const dLat = (glat - allStations[s].lat) * kmPerDegLat;
        const dLon = (glon - allStations[s].lon) * kmPerDegLon;
        const d2 = dLat * dLat + dLon * dLon;
        const w = Math.exp(-d2 / (2 * sigmaKm * sigmaKm));
        gridWeights[rowOffset + s] = w;
        sum += w;
        // insertion into the small top-K-nearest list
        if (d2 < topD2[CORE_K - 1]) {
          let p = CORE_K - 1;
          while (p > 0 && topD2[p - 1] > d2) { topD2[p] = topD2[p - 1]; topS[p] = topS[p - 1]; p--; }
          topD2[p] = d2; topS[p] = s;
        }
      }
      if (sum > 0) {
        for (let s = 0; s < N; s++) gridWeights[rowOffset + s] /= sum;
      }

      nearestDistKm[gridIdx] = Math.sqrt(topD2[0]);
      const coreBase = gridIdx * CORE_K;
      let coreSum = 0;
      for (let k = 0; k < CORE_K; k++) {
        if (topS[k] < 0) continue;
        const w = Math.exp(-topD2[k] / (2 * sigmaCoreKm * sigmaCoreKm));
        coreIdx[coreBase + k] = topS[k];
        coreWeight[coreBase + k] = w;
        coreSum += w;
      }
      if (coreSum > 0) {
        for (let k = 0; k < CORE_K; k++) coreWeight[coreBase + k] /= coreSum;
      }
    }
  }
}

function interpolateSnowCm(gridIdx, vals) {
  const rowOffset = gridIdx * N;
  let cm = 0;
  for (let s = 0; s < N; s++) cm += gridWeights[rowOffset + s] * vals[s];
  return cm;
}

// ============================================================
// 3) Canvas-painted snow overlay, draped flat on the basemap.
//    Color scale is calibrated to the season's true nationwide maximum;
//    EXAG_FACTOR only stretches how strongly that scale is applied
//    visually (a display-only gamma-style boost), it never changes
//    the underlying cm values. Fixed (not user-adjustable).
// ============================================================
const EXAG_FACTOR = 3.0;
const COLOR_STOPS = [
  { t: 0.00, r: 10,  g: 15,  b: 22,  a: 0   },
  { t: 0.04, r: 56,  g: 170, b: 220, a: 70  },
  { t: 0.25, r: 130, g: 200, b: 235, a: 155 },
  { t: 0.55, r: 195, g: 227, b: 246, a: 212 },
  { t: 1.00, r: 255, g: 255, b: 255, a: 248 }
];

function colorForT(t) {
  if (t <= 0) return [0, 0, 0, 0];
  if (t >= 1) { const s = COLOR_STOPS[COLOR_STOPS.length - 1]; return [s.r, s.g, s.b, s.a]; }
  for (let i = 0; i < COLOR_STOPS.length - 1; i++) {
    const a = COLOR_STOPS[i], b = COLOR_STOPS[i + 1];
    if (t >= a.t && t <= b.t) {
      const f = (b.t === a.t) ? 0 : (t - a.t) / (b.t - a.t);
      return [
        a.r + (b.r - a.r) * f,
        a.g + (b.g - a.g) * f,
        a.b + (b.b - a.b) * f,
        a.a + (b.a - a.a) * f
      ];
    }
  }
  return [255, 255, 255, 248];
}

const snowCanvas = document.createElement('canvas');
snowCanvas.id = 'snowCanvas';
snowCanvas.width = GRID_NX;
snowCanvas.height = GRID_NY;
snowCanvas.style.position = 'absolute';
snowCanvas.style.left = '-99999px';
snowCanvas.style.top = '-99999px';
document.body.appendChild(snowCanvas);
const snowCtx = snowCanvas.getContext('2d');

// Within CORE_KM of a station, the narrow-sigma "core" field dominates;
// beyond FADE_KM, the plain broad-sigma interpolation is used; in between,
// the two are blended.
const CORE_KM = 10, FADE_KM = 40;

function updateCanvas(idx) {
  const day = series[idx];
  const vals = new Float32Array(N);
  for (let s = 0; s < N; s++) vals[s] = day[s] || 0;

  const imgData = snowCtx.createImageData(GRID_NX, GRID_NY);
  const data = imgData.data;
  const total = GRID_NX * GRID_NY;
  for (let g = 0; g < total; g++) {
    const px = g * 4;
    if (!isLand[g]) { data[px + 3] = 0; continue; }
    const broad = interpolateSnowCm(g, vals);
    const coreBase = g * CORE_K;
    let core = 0;
    for (let k = 0; k < CORE_K; k++) {
      const si = coreIdx[coreBase + k];
      if (si < 0) continue;
      core += coreWeight[coreBase + k] * vals[si];
    }
    const d = nearestDistKm[g];
    let blend;
    if (d <= CORE_KM) blend = 1;
    else if (d >= FADE_KM) blend = 0;
    else blend = 1 - (d - CORE_KM) / (FADE_KM - CORE_KM);
    const cm = core * blend + broad * (1 - blend);
    const t = Math.min(Math.pow(cm / 100, 0.45), 1);
    const [r, gg, b, a] = colorForT(t);
    data[px] = r; data[px + 1] = gg; data[px + 2] = b; data[px + 3] = a;
  }
  snowCtx.putImageData(imgData, 0, 0);
  if (snowLayer) snowLayer.setUrl(snowCanvas.toDataURL());
}

// ============================================================
// 4) Station snow-depth labels (numbers only, no bars) — every
//    station nationwide, always. Region selection never touches these.
// ============================================================
const stationTooltip = document.getElementById('stationTooltip');

function showStationTooltip(name, x, y) {
  stationTooltip.textContent = name;
  stationTooltip.style.left = x + 'px';
  stationTooltip.style.top = y + 'px';
  stationTooltip.classList.add('visible');
}
function moveStationTooltip(x, y) {
  stationTooltip.style.left = x + 'px';
  stationTooltip.style.top = y + 'px';
}
function hideStationTooltip() {
  stationTooltip.classList.remove('visible');
}

const labelObjs = allStations.map(st => {
  const marker = L.marker([st.lat, st.lon], {
    icon: L.divIcon({
      className: 'snow-label-wrap',
      html: '<div class="snow-label"></div><div class="snow-label-dot"></div>',
      iconSize: [0, 0],
      iconAnchor: [0, 0]
    }),
    interactive: false
  }).addTo(map);
  const el = marker.getElement();
  const valEl = el.querySelector('.snow-label');

  // Hovering a number shows only that station's name; moving to another
  // number immediately swaps the tooltip content since there is just one
  // shared tooltip element for the whole map.
  valEl.addEventListener('mouseenter', (e) => {
    showStationTooltip(st.name, e.clientX, e.clientY);
  });
  valEl.addEventListener('mousemove', (e) => {
    moveStationTooltip(e.clientX, e.clientY);
  });
  valEl.addEventListener('mouseleave', () => {
    hideStationTooltip();
  });

  return { el, valEl, marker };
});

// ============================================================
// 5) Playback controls
// ============================================================
let curIndex = 0;
let playing = false;
let timer = null;
let endIndex = 0;

// Finds the last day index that still has snow (>0) anywhere in the
// country, then returns the following day (guaranteed all-zero) so the
// right edge of the slider always lands on a fully-zero, stays-zero day.
function computeEndIndex() {
  for (let idx = series.length - 1; idx >= 0; idx--) {
    const day = series[idx];
    for (let s = 0; s < N; s++) {
      if (day[s] !== null && day[s] > 0) {
        return Math.min(idx + 1, series.length - 1);
      }
    }
  }
  return series.length - 1;
}

const slider = document.getElementById('slider');
const dateLabel = document.getElementById('dateLabel');
const playBtn = document.getElementById('playBtn');
const speedSel = document.getElementById('speedSel');
const maxInfo = document.getElementById('maxInfo');
const legendMax = document.getElementById('legendMax');
const rangeLabel = document.getElementById('rangeLabel');
const yearSel = document.getElementById('yearSel');
const regionSel = document.getElementById('regionSel');
const titleText = document.getElementById('titleText');
const numbersToggle = document.getElementById('numbersToggle');
let numbersOn = true;

function formatDate(s) {
  const [y, m, d] = s.split('/');
  return `${y}年${m}月${d}日`;
}

function render(idx) {
  curIndex = idx;
  const day = series[idx];
  dateLabel.textContent = formatDate(dates[idx]);
  slider.value = idx;
  hideStationTooltip();

  let dayMax = 0, dayMaxName = '';
  for (let s = 0; s < N; s++) {
    const v = day[s];
    if (v !== null && v > dayMax) { dayMax = v; dayMaxName = allStations[s].name; }
  }

  for (let s = 0; s < N; s++) {
    const v = day[s];
    const lbl = labelObjs[s];
    if (!numbersOn || v === null || v <= 0) {
      lbl.el.style.opacity = '0';
      lbl.valEl.style.pointerEvents = 'none';
    } else {
      lbl.el.style.opacity = '1';
      lbl.valEl.textContent = v + 'cm';
      lbl.valEl.style.pointerEvents = 'auto';
    }
  }

  updateCanvas(idx);

  maxInfo.innerHTML = dayMax > 0 ? `この日の最大: <b>${dayMaxName} ${dayMax}cm</b>` : '';
}

slider.addEventListener('input', () => { stopPlay(); render(parseInt(slider.value, 10)); });

function stepForward() {
  let next = curIndex + 1;
  if (next > endIndex) next = startIndex;
  render(next);
}
function startPlay() {
  playing = true; playBtn.textContent = '❚❚';
  timer = setInterval(stepForward, parseInt(speedSel.value, 10));
}
function stopPlay() {
  playing = false; playBtn.textContent = '▶';
  if (timer) { clearInterval(timer); timer = null; }
}
playBtn.addEventListener('click', () => { playing ? stopPlay() : startPlay(); });
speedSel.addEventListener('change', () => { if (playing) { stopPlay(); startPlay(); } });
numbersToggle.addEventListener('change', () => {
  numbersOn = numbersToggle.checked;
  if (series.length) render(curIndex);
});

// ============================================================
// 6) Region switching — camera only. The grid, mask, markers and
//    color scale are nationwide and never change; only the map's
//    framing (via fitBounds) moves.
// ============================================================
let currentRegion = DEFAULT_REGION;

function switchRegion(regionKey) {
  currentRegion = regionKey;
  const vb = VIEW_BOUNDS[regionKey];
  map.fitBounds([[vb.latMin, vb.lonMin], [vb.latMax, vb.lonMax]]);
  const label = REGION_LABELS[regionKey];
  titleText.textContent = `${label} 日最深積雪 平面マップ`;
  const startY = parseInt(yearSel.value, 10);
  document.title = `${label} 日最深積雪 平面マップ ${startY}-${startY + 1}`;
}

regionSel.addEventListener('change', () => { switchRegion(regionSel.value); });

// ============================================================
// 7) Year switching — loads a different season's dates/series;
//    the grid, mask and markers stay as-is.
// ============================================================
let snowLayer = null;

async function loadYear(yearKey) {
  stopPlay();
  document.getElementById('loading').style.display = 'flex';
  document.getElementById('loading').style.opacity = 1;
  const yd = await loadYearData(yearKey);
  if (!yd) return;
  dates = yd.dates;
  series = yd.series;
  startIndex = Math.min(yd.startIndex, dates.length - 1);
  endIndex = Math.max(computeEndIndex(), startIndex);

  globalMax = computeGlobalMax();
  colorScaleMax = globalMax > 0 ? globalMax : 1;
  legendMax.textContent = Math.round(globalMax) + 'cm';

  const startY = parseInt(yearKey, 10);
  const endY = startY + 1;
  const label = REGION_LABELS[currentRegion];
  rangeLabel.textContent = `${startY}年10月1日〜${endY}年5月31日 ／ 気象庁アメダス・国土地理院 淡色地図`;
  document.title = `${label} 日最深積雪 平面マップ ${startY}-${endY}`;

  slider.min = startIndex;
  slider.max = endIndex;
  slider.value = startIndex;

  render(startIndex);
  document.getElementById('loading').style.opacity = 0;
  setTimeout(() => { document.getElementById('loading').style.display = 'none'; }, 450);
}

yearSel.addEventListener('change', () => { loadYear(yearSel.value); });

// ============================================================
// 8) Load basemap + snow overlay, then start
// ============================================================
L.tileLayer('https://cyberjapandata.gsi.go.jp/xyz/pale/{z}/{x}/{y}.png', {
  maxZoom: 18,
  attribution: '地図: 国土地理院'
}).addTo(map);

regionSel.value = DEFAULT_REGION;
yearSel.value = DEFAULT_YEAR;
await loadYear(DEFAULT_YEAR);

snowLayer = L.imageOverlay(snowCanvas.toDataURL(), [[latMax, lonMin], [latMin, lonMax]], {
  opacity: 1,
  interactive: false
}).addTo(map);
{
  const imgEl = snowLayer.getElement();
  if (imgEl) {
    imgEl.style.filter = 'blur(2.5px)';
    imgEl.style.imageRendering = 'auto'; // let the browser smooth-scale the low-res grid too
  }
}
updateCanvas(curIndex);
}
main();
</script>
